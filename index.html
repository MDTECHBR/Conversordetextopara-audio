<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎙️ Texto para WAV | Sintetizador Offline</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #0f172a 100%);
            min-height: 100vh;
        }
        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .btn-primary {
            background: linear-gradient(135deg, #a855f7, #3b82f6);
            transition: all 0.2s ease;
        }
        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(168, 85, 247, 0.4);
        }
        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.2s ease;
        }
        .btn-secondary:hover:not(:disabled) {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-1px);
        }
        .btn-secondary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        textarea, select {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.2s ease;
        }
        textarea:focus, select:focus {
            outline: none;
            border-color: #a855f7;
            box-shadow: 0 0 0 3px rgba(168, 85, 247, 0.1);
        }
        .progress-bar {
            background: linear-gradient(90deg, #a855f7, #3b82f6);
            height: 3px;
            width: 0%;
            transition: width 0.3s ease;
        }
        input[type="range"] {
            -webkit-appearance: none;
            background: rgba(255, 255, 255, 0.1);
            height: 4px;
            border-radius: 2px;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px;
            height: 14px;
            background: #a855f7;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 6px #a855f7;
        }
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(168, 85, 247, 0.5);
            border-radius: 3px;
        }
    </style>
</head>
<body class="text-white">
    <div class="min-h-screen flex items-center justify-center px-4 py-8">
        <div class="w-full max-w-2xl glass rounded-2xl p-6 md:p-8 shadow-2xl">
            <!-- Cabeçalho -->
            <div class="text-center mb-8">
                <div class="text-5xl mb-3">🎙️</div>
                <h1 class="text-2xl md:text-3xl font-bold bg-gradient-to-r from-purple-400 to-blue-400 bg-clip-text text-transparent">Texto → WAV</h1>
                <p class="text-sm text-gray-400 mt-2">Síntese de voz 100% offline</p>
            </div>

            <!-- Área de texto -->
            <div class="mb-5">
                <label class="block text-sm font-medium text-gray-300 mb-2">
                    <span>📝 Seu texto</span>
                </label>
                <textarea id="texto" rows="4" class="w-full rounded-xl p-3 text-sm text-white placeholder-gray-500 resize-none" placeholder="Digite algo... Ex: Olá, tudo bem?"></textarea>
            </div>

            <!-- Seleção de voz -->
            <div class="mb-5">
                <label class="block text-sm font-medium text-gray-300 mb-2">
                    <span>🌐 Idioma</span>
                </label>
                <select id="voz" class="w-full rounded-xl p-2.5 text-sm text-white">
                    <option value="pt-BR">🇧🇷 Português (Brasil)</option>
                    <option value="pt-PT">🇵🇹 Português (Portugal)</option>
                    <option value="en-US">🇺🇸 Inglês (EUA)</option>
                    <option value="en-GB">🇬🇧 Inglês (UK)</option>
                    <option value="es-ES">🇪🇸 Espanhol</option>
                    <option value="fr-FR">🇫🇷 Francês</option>
                    <option value="de-DE">🇩🇪 Alemão</option>
                    <option value="it-IT">🇮🇹 Italiano</option>
                    <option value="ja-JP">🇯🇵 Japonês</option>
                </select>
            </div>

            <!-- Controles -->
            <div class="grid grid-cols-2 gap-4 mb-6">
                <div>
                    <div class="flex justify-between text-xs text-gray-400 mb-1">
                        <span>⚡ Velocidade</span>
                        <span id="valorVelocidade" class="text-purple-400">1.0</span>
                    </div>
                    <input type="range" id="velocidade" min="0.5" max="2" step="0.1" value="1" class="w-full">
                </div>
                <div>
                    <div class="flex justify-between text-xs text-gray-400 mb-1">
                        <span>🎵 Tom</span>
                        <span id="valorTom" class="text-purple-400">1.0</span>
                    </div>
                    <input type="range" id="tom" min="0.5" max="2" step="0.1" value="1" class="w-full">
                </div>
            </div>

            <!-- Barra de progresso -->
            <div class="mb-6">
                <div class="bg-gray-800 rounded-full overflow-hidden">
                    <div class="progress-bar" id="barraProgresso"></div>
                </div>
            </div>

            <!-- Botões -->
            <div class="grid grid-cols-3 gap-3 mb-5">
                <button id="btnGerar" class="btn-primary rounded-xl py-2.5 text-sm font-semibold">
                    🎤 Gerar
                </button>
                <button id="btnOuvir" class="btn-secondary rounded-xl py-2.5 text-sm font-semibold" disabled>
                    🔊 Ouvir
                </button>
                <button id="btnBaixar" class="btn-secondary rounded-xl py-2.5 text-sm font-semibold" disabled>
                    💾 Baixar
                </button>
            </div>

            <!-- Status -->
            <div id="status" class="text-center text-xs text-gray-400 py-2">
                ✨ Pronto para gerar áudio
            </div>
        </div>
    </div>

    <script>
        let audioBlob = null, audioUrl = null;
        
        const elementos = {
            texto: document.getElementById('texto'),
            voz: document.getElementById('voz'),
            velocidade: document.getElementById('velocidade'),
            tom: document.getElementById('tom'),
            valorVelocidade: document.getElementById('valorVelocidade'),
            valorTom: document.getElementById('valorTom'),
            btnGerar: document.getElementById('btnGerar'),
            btnOuvir: document.getElementById('btnOuvir'),
            btnBaixar: document.getElementById('btnBaixar'),
            barraProgresso: document.getElementById('barraProgresso'),
            status: document.getElementById('status')
        };

        elementos.velocidade.addEventListener('input', () => {
            elementos.valorVelocidade.textContent = parseFloat(elementos.velocidade.value).toFixed(1);
        });
        
        elementos.tom.addEventListener('input', () => {
            elementos.valorTom.textContent = parseFloat(elementos.tom.value).toFixed(1);
        });

        function atualizarStatus(msg, tipo = 'info') {
            const cores = { sucesso: '#22c55e', erro: '#ef4444', info: '#9ca3af' };
            elementos.status.innerHTML = `<span style="color: ${cores[tipo]}">${msg}</span>`;
        }

        function progresso(p) {
            elementos.barraProgresso.style.width = `${p}%`;
        }

        async function gerarWAV(texto, idioma, vel, tom) {
            return new Promise(async (resolve, reject) => {
                if (!window.speechSynthesis) return reject(new Error("Navegador sem suporte"));
                
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(texto);
                utterance.lang = idioma;
                utterance.rate = vel;
                utterance.pitch = tom;
                
                let vozes = window.speechSynthesis.getVoices();
                if (!vozes.length) {
                    await new Promise(r => window.speechSynthesis.onvoiceschanged = () => { vozes = window.speechSynthesis.getVoices(); r(); });
                }
                
                const vozOk = vozes.find(v => v.lang === idioma);
                if (vozOk) utterance.voice = vozOk;
                
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const dest = ctx.createMediaStreamDestination();
                const recorder = new MediaRecorder(dest.stream);
                const chunks = [];
                
                recorder.ondataavailable = e => e.data.size && chunks.push(e.data);
                const completo = new Promise(r => recorder.onstop = () => r(new Blob(chunks, { type: 'audio/wav' })));
                
                recorder.start();
                window.speechSynthesis.speak(utterance);
                
                const duracao = Math.max(1, texto.length / 15) * (1 / vel);
                setTimeout(() => recorder.state === 'recording' && recorder.stop(), duracao * 1000 + 500);
                
                const blob = await completo;
                blob.size < 1000 ? reject(new Error("Falha")) : resolve(blob);
            });
        }

        function fallbackWAV(texto) {
            const taxa = 44100;
            const duracao = Math.min(4, Math.max(0.8, texto.length * 0.04));
            const amostras = taxa * duracao;
            const buffer = new ArrayBuffer(44 + amostras * 4);
            const view = new DataView(buffer);
            
            const escrever = (str, off) => { for(let i=0; i<str.length; i++) view.setUint8(off+i, str.charCodeAt(i)); };
            
            escrever('RIFF', 0);
            view.setUint32(4, 36 + amostras * 4, true);
            escrever('WAVE', 8);
            escrever('fmt ', 12);
            view.setUint32(16, 16, true);
            view.setUint16(20, 1, true);
            view.setUint16(22, 2, true);
            view.setUint32(24, taxa, true);
            view.setUint32(28, taxa * 4, true);
            view.setUint16(32, 4, true);
            view.setUint16(34, 16, true);
            escrever('data', 36);
            view.setUint32(40, amostras * 4, true);
            
            let off = 44;
            for(let i=0; i<amostras; i++) {
                const val = Math.sin(2 * Math.PI * 440 * (i/taxa)) * 32767;
                view.setInt16(off, val, true);
                view.setInt16(off+2, val, true);
                off += 4;
            }
            return new Blob([buffer], { type: 'audio/wav' });
        }

        elementos.btnGerar.addEventListener('click', async () => {
            const texto = elementos.texto.value.trim();
            if (!texto) return atualizarStatus("⚠️ Digite um texto", "erro");
            if (texto.length > 500) return atualizarStatus("⚠️ Máx. 500 caracteres", "erro");
            
            elementos.btnGerar.disabled = true;
            elementos.btnOuvir.disabled = true;
            elementos.btnBaixar.disabled = true;
            atualizarStatus("🎙️ Gerando áudio...", "info");
            progresso(20);
            
            try {
                const idioma = elementos.voz.value;
                const vel = parseFloat(elementos.velocidade.value);
                const tom = parseFloat(elementos.tom.value);
                
                progresso(40);
                try {
                    audioBlob = await gerarWAV(texto, idioma, vel, tom);
                    progresso(100);
                    atualizarStatus("✅ Áudio gerado!", "sucesso");
                } catch {
                    audioBlob = fallbackWAV(texto);
                    progresso(100);
                    atualizarStatus("✅ Áudio pronto (modo compatível)", "info");
                }
                
                if (audioUrl) URL.revokeObjectURL(audioUrl);
                audioUrl = URL.createObjectURL(audioBlob);
                elementos.btnOuvir.disabled = false;
                elementos.btnBaixar.disabled = false;
                setTimeout(() => progresso(0), 1000);
            } catch (err) {
                atualizarStatus(`❌ ${err.message}`, "erro");
                progresso(0);
            } finally {
                elementos.btnGerar.disabled = false;
            }
        });
        
        elementos.btnOuvir.addEventListener('click', () => {
            if (!audioUrl) return atualizarStatus("⚠️ Gere o áudio primeiro", "erro");
            new Audio(audioUrl).play().then(() => atualizarStatus("🔊 Reproduzindo", "sucesso"))
                               .catch(() => atualizarStatus("❌ Erro ao reproduzir", "erro"));
        });
        
        elementos.btnBaixar.addEventListener('click', () => {
            if (!audioBlob || !audioUrl) return atualizarStatus("⚠️ Gere o áudio primeiro", "erro");
            const nome = (elementos.texto.value.trim().slice(0, 25).replace(/[^a-z0-9]/gi, '_') || 'audio') + '_' + Date.now() + '.wav';
            const link = document.createElement('a');
            link.href = audioUrl;
            link.download = nome;
            link.click();
            atualizarStatus(`💾 ${nome} baixado`, "sucesso");
        });
        
        window.addEventListener('beforeunload', () => {
            if (audioUrl) URL.revokeObjectURL(audioUrl);
            window.speechSynthesis?.cancel();
        });
        
        elementos.texto.value = "Olá! Teste de conversão para WAV.";
    </script>
</body>
</html>
